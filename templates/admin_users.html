{% extends "base.html" %}
{% block content %}
<h1 style="font-size: 2rem; font-weight: 600; margin-bottom: 2rem;">Управление пользователями</h1>

<div style="background: white; border-radius: 20px; padding: 1.5rem; overflow-x: auto;">
    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="border-bottom: 1px solid #e2e8f0;">
                <th style="padding: 1rem;">ID</th>
                <th style="padding: 1rem;">Имя</th>
                <th style="padding: 1rem;">Email</th>
                <th style="padding: 1rem;">Роль</th>
                <th style="padding: 1rem;"></th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr style="border-bottom: 1px solid #f1f5f9;">
                <td style="padding: 1rem;">{{ u.id }}</td>
                <td style="padding: 1rem;">{{ u.username }}</td>
                <td style="padding: 1rem;">{{ u.email }}</td>
                <td style="padding: 1rem;">{{ u.role }}</td>
                <td style="padding: 1rem;">
                    <form method="POST" action="{{ url_for('update_user_role', user_id=u.id) }}" style="display: flex; gap: 8px;">
                        <select name="role" style="padding: 8px; border-radius: 8px;">
                            <option value="user" {% if u.role=='user' %}selected{% endif %}>Пользователь</option>
                            <option value="foreman" {% if u.role=='foreman' %}selected{% endif %}>Прораб</option>
                            <option value="supplier" {% if u.role=='supplier' %}selected{% endif %}>Снабженец</option>
                            <option value="manager" {% if u.role=='manager' %}selected{% endif %}>Руководитель</option>
                            <option value="admin" {% if u.role=='admin' %}selected{% endif %}>Админ</option>
                        </select>
                        <button type="submit" style="background: #2563eb; color: white; border: none; padding: 8px 12px; border-radius: 8px;">Сохранить</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
