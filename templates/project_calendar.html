{% extends "base.html" %}
{% block content %}
<h1>📅 Календарь этапов: {{ project.name }}</h1>
<p style="color:#64748b; margin-bottom:1.5rem;">Кликните по дате, чтобы увидеть этапы на этот день</p>

<div style="display: flex; gap: 2rem; flex-wrap: wrap;">
    <!-- Календарь -->
    <div style="flex: 2;">
        <div id="calendar" style="background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden;"></div>
    </div>
    
    <!-- Список этапов на выбранную дату -->
    <div style="flex: 1;">
        <div class="card">
            <h3 style="margin-top:0;">📋 Этапы на <span id="selectedDate">—</span></h3>
            <div id="stagesList" style="max-height: 400px; overflow-y: auto;">
                <p style="color:#64748b;">Выберите дату на календаре</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Данные этапов
    const stagesData = [
        {% for stage in stages %}
        {
            id: {{ stage.id }},
            name: "{{ stage.name }}",
            start_date: "{{ dates[stage.id][0].strftime('%Y-%m-%d') if dates.get(stage.id) else '' }}",
            end_date: "{{ dates[stage.id][1].strftime('%Y-%m-%d') if dates.get(stage.id) else '' }}",
            percent: {{ stage.percent_complete }},
            resources: "{{ assignments.get(stage.id, [])|join(', ') }}"
        },
        {% endfor %}
    ];
    
    // Функция для получения этапов на конкретную дату
    function getStagesByDate(date) {
        const dateStr = date.toISOString().split('T')[0];
        const stages = stagesData.filter(stage => {
            return stage.start_date <= dateStr && stage.end_date >= dateStr;
        });
        return stages;
    }
    
    // Функция обновления списка этапов
    function updateStagesList(date) {
        const stages = getStagesByDate(date);
        const container = document.getElementById('stagesList');
        const dateDisplay = document.getElementById('selectedDate');
        
        dateDisplay.textContent = date.toLocaleDateString('ru-RU');
        
        if (stages.length === 0) {
            container.innerHTML = '<p style="color:#64748b;">📭 Нет этапов на этот день</p>';
            return;
        }
        
        let html = '<ul style="list-style: none; padding: 0; margin: 0;">';
        stages.forEach(stage => {
            let status = '';
            let statusColor = '';
            if (stage.percent >= 100) {
                status = '✅ Завершён';
                statusColor = '#10b981';
            } else if (stage.percent > 0) {
                status = '🔄 В работе (' + stage.percent + '%)';
                statusColor = '#f59e0b';
            } else {
                status = '⏳ Не начат';
                statusColor = '#64748b';
            }
            
            html += `
                <li style="padding: 12px; border-bottom: 1px solid #e2e8f0;">
                    <strong>${stage.name}</strong><br>
                    <span style="font-size: 0.875rem; color: #64748b;">
                        📅 ${stage.start_date} — ${stage.end_date}<br>
                        👥 ${stage.resources || '—'}<br>
                        <span style="color: ${statusColor};">${status}</span>
                    </span>
                </li>
            `;
        });
        html += '</ul>';
        container.innerHTML = html;
    }
    
    // Инициализация календаря
    let currentDate = new Date();
    let selectedDate = new Date();
    
    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        const startDayOfWeek = firstDay.getDay() || 7;
        
        let calendarHtml = `
            <div style="background: #f1f5f9; padding: 12px; display: flex; justify-content: space-between; align-items: center;">
                <button onclick="prevMonth()" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">◀</button>
                <h3 style="margin: 0;">${firstDay.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' })}</h3>
                <button onclick="nextMonth()" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">▶</button>
            </div>
            <div style="display: grid; grid-template-columns: repeat(7, 1fr); background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                <div style="padding: 8px; text-align: center; font-weight: bold;">Пн</div>
                <div style="padding: 8px; text-align: center; font-weight: bold;">Вт</div>
                <div style="padding: 8px; text-align: center; font-weight: bold;">Ср</div>
                <div style="padding: 8px; text-align: center; font-weight: bold;">Чт</div>
                <div style="padding: 8px; text-align: center; font-weight: bold;">Пт</div>
                <div style="padding: 8px; text-align: center; font-weight: bold;">Сб</div>
                <div style="padding: 8px; text-align: center; font-weight: bold;">Вс</div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(7, 1fr);">
        `;
        
        let day = 1;
        let dayOfWeek = startDayOfWeek;
        
        // Пустые ячейки до первого дня
        for (let i = 1; i < startDayOfWeek; i++) {
            calendarHtml += `<div style="padding: 8px; text-align: center; background: #fafafa; min-height: 60px;"></div>`;
        }
        
        // Дни месяца
        while (day <= lastDay.getDate()) {
            const date = new Date(year, month, day);
            const dateStr = date.toISOString().split('T')[0];
            const stagesOnDay = stagesData.filter(s => s.start_date <= dateStr && s.end_date >= dateStr);
            const hasStages = stagesOnDay.length > 0;
            const isSelected = selectedDate.toDateString() === date.toDateString();
            
            let bgColor = '#fff';
            if (isSelected) bgColor = '#dbeafe';
            else if (hasStages) bgColor = '#fef9c3';
            
            calendarHtml += `
                <div onclick="selectDate(${year}, ${month}, ${day})" 
                     style="padding: 8px; text-align: center; background: ${bgColor}; min-height: 60px; cursor: pointer; border: 1px solid #e2e8f0;">
                    <div style="font-weight: bold;">${day}</div>
                    ${hasStages ? `<div style="font-size: 10px; color: #3b82f6;">${stagesOnDay.length} этапов</div>` : ''}
                </div>
            `;
            day++;
        }
        
        calendarHtml += `</div>`;
        document.getElementById('calendar').innerHTML = calendarHtml;
    }
    
    function selectDate(year, month, day) {
        selectedDate = new Date(year, month, day);
        renderCalendar();
        updateStagesList(selectedDate);
    }
    
    function prevMonth() {
        currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
        renderCalendar();
        updateStagesList(selectedDate);
    }
    
    function nextMonth() {
        currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
        renderCalendar();
        updateStagesList(selectedDate);
    }
    
    // Инициализация
    renderCalendar();
    updateStagesList(selectedDate);
</script>

<div style="margin-top: 1.5rem;">
    <a href="{{ url_for('project_view', project_id=project.id) }}" class="card" style="display:inline-block; padding:0.75rem 1.5rem; text-decoration:none;">← Вернуться к проекту</a>
</div>

<style>
    .card {
        background: white;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        padding: 1rem;
        transition: box-shadow 0.2s;
    }
    .card:hover {
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
</style>
{% endblock %}
